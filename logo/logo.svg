<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Filter for paper texture glow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#d4a574" flood-opacity="0.4"/>
    </filter>
    
    <linearGradient id="terracottaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a64938"/>
      <stop offset="100%" stop-color="#8b3a2b"/>
    </linearGradient>

    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6f87"/>
      <stop offset="100%" stop-color="#3b5a6f"/>
    </linearGradient>
  </defs>

  <!-- Paper background card -->
  <rect x="20" y="20" width="460" height="460" rx="24" fill="#fdfbf7" stroke="#d4a574" stroke-width="4" stroke-dasharray="12 6" filter="url(#shadow)"/>

  <!-- Outer Ring (Sanctuary boundary) -->
  <circle cx="250" cy="210" r="110" fill="none" stroke="#d4a574" stroke-width="6" stroke-dasharray="8 4"/>

  <!-- Left Interlocking Knot Loop (Omoide 1-on-1) -->
  <path d="M 210,210 C 150,150 150,270 210,210 Z" fill="none" stroke="url(#terracottaGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right Interlocking Knot Loop (Fireside Circle) -->
  <path d="M 290,210 C 350,150 350,270 290,210 Z" fill="none" stroke="url(#slateGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central Kizuna Bond Node (Shizuka Solitude Core) -->
  <circle cx="250" cy="210" r="28" fill="#8b3a2b" stroke="#fdfbf7" stroke-width="5"/>
  <circle cx="250" cy="210" r="10" fill="#f5e6c8"/>

  <!-- Kanji & English Typography -->
  <text x="250" y="375" text-anchor="middle" font-family="'Fredoka', 'Quicksand', sans-serif" font-weight="700" font-size="42" fill="#8b3a2b" letter-spacing="4">KIZUNA</text>
  <text x="250" y="415" text-anchor="middle" font-family="'Caveat', cursive, sans-serif" font-weight="600" font-size="28" fill="#3b5a6f">絆 · Purposeful Connection</text>
</svg>
